name: Release

on:
  push:
    branches: [ main ]

jobs:
  check-version:
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, '[auto-version-bump]')"
    outputs:
      version: ${{ steps.bump.outputs.new_version }}
      should-release: ${{ steps.bump.outputs.should_release }}
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Determine version bump from commit message
      id: bump
      run: |
        COMMIT_MSG="${{ github.event.head_commit.message }}"
        CURRENT=$(grep "^version =" cli/Cargo.toml | sed 's/.*"\(.*\)".*/\1/')
        IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"

        echo "Current version: $CURRENT"
        echo "Commit message: $COMMIT_MSG"

        if echo "$COMMIT_MSG" | grep -qi "^major:"; then
          MAJOR=$((MAJOR + 1))
          MINOR=0
          PATCH=0
          echo "Bump type: major"
        elif echo "$COMMIT_MSG" | grep -qi "^minor:"; then
          MINOR=$((MINOR + 1))
          PATCH=0
          echo "Bump type: minor"
        elif echo "$COMMIT_MSG" | grep -qi "^patch:"; then
          PATCH=$((PATCH + 1))
          echo "Bump type: patch"
        else
          echo "No version keyword found in commit message. Skipping release."
          echo "should_release=false" >> $GITHUB_OUTPUT
          echo "new_version=$CURRENT" >> $GITHUB_OUTPUT
          exit 0
        fi

        NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}"
        echo "New version: $NEW_VERSION"
        echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT
        echo "should_release=true" >> $GITHUB_OUTPUT

    - name: Update Cargo.toml version
      if: steps.bump.outputs.should_release == 'true'
      run: |
        NEW_VERSION=${{ steps.bump.outputs.new_version }}
        sed -i "s/^version = \".*\"/version = \"$NEW_VERSION\"/" cli/Cargo.toml
        echo "Updated cli/Cargo.toml to $NEW_VERSION"
        grep "^version" cli/Cargo.toml

    - name: Commit version bump
      if: steps.bump.outputs.should_release == 'true'
      run: |
        NEW_VERSION=${{ steps.bump.outputs.new_version }}
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add cli/Cargo.toml
        git commit -m "v${NEW_VERSION} [auto-version-bump]"
        git push

  release:
    needs: check-version
    if: needs.check-version.outputs.should-release == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@v4
      with:
        ref: main

    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: v${{ needs.check-version.outputs.version }}
        name: Release v${{ needs.check-version.outputs.version }}
        body: |
          ## Catch Pokemon CLI v${{ needs.check-version.outputs.version }}

          ### Quick Install

          ```bash
          curl -sSL https://raw.githubusercontent.com/matthewmyrick/catch-pokemon/main/install.sh | bash
          ```

          This installs the pre-built binary, pokemon-colorscripts, and shell functions automatically.

          ### Play

          ```bash
          pokemon_encounter    # A wild Pokemon appears!
          catch                # Throw a Poke Ball
          pc                   # View your collection
          ```

          **Full Changelog**: https://github.com/matthewmyrick/catch-pokemon/commits/v${{ needs.check-version.outputs.version }}
        draft: false
        prerelease: false

  build-cross-platform:
    needs: [check-version, release]
    if: needs.check-version.outputs.should-release == 'true'
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            suffix: linux-x86_64
          - os: macos-latest
            target: x86_64-apple-darwin
            suffix: macos-x86_64
          - os: macos-latest
            target: aarch64-apple-darwin
            suffix: macos-arm64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            suffix: windows-x86_64
            ext: .exe

    steps:
    - uses: actions/checkout@v4
      with:
        ref: main

    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: ${{ matrix.target }}

    - name: Cache dependencies
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          cli/target
        key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('cli/Cargo.lock') }}

    - name: Build release binary
      env:
        BUILD_SECRET_KEY: ${{ secrets.BUILD_SECRET_KEY }}
        CATCH_POKEMON_API_URL: ${{ vars.CATCH_POKEMON_API_URL }}
      working-directory: cli
      run: cargo build --release --target ${{ matrix.target }}

    - name: Create release archive (Unix)
      if: matrix.os != 'windows-latest'
      run: |
        mkdir -p release
        cp cli/target/${{ matrix.target }}/release/catch-pokemon release/
        tar -czf catch-pokemon-v${{ needs.check-version.outputs.version }}-${{ matrix.suffix }}.tar.gz -C release .

    - name: Create release archive (Windows)
      if: matrix.os == 'windows-latest'
      run: |
        mkdir release
        copy cli\target\${{ matrix.target }}\release\catch-pokemon.exe release\
        powershell Compress-Archive -Path release\* -DestinationPath catch-pokemon-v${{ needs.check-version.outputs.version }}-${{ matrix.suffix }}.zip

    - name: Upload Release Asset (Unix)
      if: matrix.os != 'windows-latest'
      uses: softprops/action-gh-release@v1
      with:
        tag_name: v${{ needs.check-version.outputs.version }}
        files: catch-pokemon-v${{ needs.check-version.outputs.version }}-${{ matrix.suffix }}.tar.gz

    - name: Upload Release Asset (Windows)
      if: matrix.os == 'windows-latest'
      uses: softprops/action-gh-release@v1
      with:
        tag_name: v${{ needs.check-version.outputs.version }}
        files: catch-pokemon-v${{ needs.check-version.outputs.version }}-${{ matrix.suffix }}.zip
